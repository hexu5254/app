spring.datasource.url=jdbc:h2:mem:authdb;MODE=PostgreSQL;DATABASE_TO_LOWER=FALSE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false

app.auth.enterprise-admin-user-id=-1
app.auth.bcrypt-strength=10
app.auth.max-failed-logins=5
app.auth.lock-duration-minutes=15
