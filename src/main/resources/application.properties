spring.application.name=app

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=supabase123456
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

app.auth.session-attribute-name=user
# 企业管理员用户主键（该 id 登录后带 IS_ADMIN_EMP）；生产默认 1，与历史 Constants.ADMIN_ID 对齐
app.auth.enterprise-admin-user-id=1
app.auth.bcrypt-strength=10
app.auth.max-failed-logins=5
app.auth.lock-duration-minutes=15
